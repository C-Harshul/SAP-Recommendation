# Experience Garage market trends source registry.
# Credentials are NEVER stored here — use env vars or AWS Secrets Manager.

sources:
  # --- Category A: builder ---
  - id: kaggle
    category: builder
    connector: kaggle
    cadence_minutes: 60
    config:
      tags: [machine-learning, deep-learning, nlp, computer-vision, llm]
      content_types: [competition, dataset, notebook]

  - id: hackerrank
    category: builder
    connector: hackerrank
    cadence_minutes: 360

  - id: ideanote
    category: builder
    connector: ideanote
    cadence_minutes: 60

  - id: udemy
    category: builder
    connector: udemy
    cadence_minutes: 360

  - id: coursera
    category: builder
    connector: coursera
    cadence_minutes: 60

  - id: forage
    category: builder
    connector: forage
    cadence_minutes: 360

  # --- Category B: news (RSS) ---
  - id: techcrunch_ai
    category: news
    connector: rss_generic
    cadence_minutes: 30
    config:
      url: https://techcrunch.com/category/artificial-intelligence/feed/
      keyword_filter: null

  - id: venturebeat_ai
