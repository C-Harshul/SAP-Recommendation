<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SAP ExG — Interview Transcript Converter</title>
  <style>
    /* SAP Fiori-inspired palette, matching the dashboard design system */
    :root {
      --background: #f5f5f5;
      --card: #ffffff;
      --foreground: #21262c;
      --text-secondary: #475059;
      --text-tertiary: #74808b;
      --sap-navy: #354a5f;
      --sap-amber: #f0ab00;
      --accent-blue: #1b6ec2;
      --accent-green: #279d55;
      --destructive: #d32f2f;
      --border: #dde2e6;
      --muted: #f0f2f4;
      --radius: 4px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: var(--background);
      color: var(--foreground);
      font-size: 14px;
      line-height: 1.5;
    }

    header {
      background: var(--sap-navy);
      color: #fff;
      padding: 18px 28px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header .dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--sap-amber);
    }
    header h1 { font-size: 18px; font-weight: 600; margin: 0; }
    header .sub { color: #b9c4cd; font-size: 13px; margin-left: auto; }

    main { max-width: 880px; margin: 0 auto; padding: 28px 20px 60px; }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 18px;
      box-shadow: 0 1px 2px rgba(33,38,44,0.04);
    }

    /* Drop zone */
    #drop {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 36px 20px;
      text-align: center;
      color: var(--text-secondary);
      transition: border-color .15s, background .15s;
      cursor: pointer;
    }
    #drop.drag { border-color: var(--sap-amber); background: #fff8e6; }
    #drop .big { font-size: 15px; font-weight: 600; color: var(--foreground); }
    #drop .small { font-size: 13px; color: var(--text-tertiary); margin-top: 4px; }

    .filelist { margin: 14px 0 0; padding: 0; list-style: none; }
    .filelist li {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 10px; background: var(--muted);
      border-radius: var(--radius); margin-bottom: 6px; font-size: 13px;
    }
    .filelist .rm {
      margin-left: auto; cursor: pointer; color: var(--text-tertiary);
      border: none; background: none; font-size: 16px; line-height: 1;
    }

    .row { display: flex; gap: 10px; align-items: center; margin-top: 14px; }

    button.primary {
      background: var(--sap-navy); color: #fff; border: none;
      padding: 9px 18px; border-radius: var(--radius); font-size: 14px;
      font-weight: 600; cursor: pointer; font-family: inherit;
    }
    button.primary:hover:not(:disabled) { background: #2a3b4c; }
    button.primary:disabled { opacity: .5; cursor: not-allowed; }

    .hint { color: var(--text-tertiary); font-size: 13px; }

    h2 { font-size: 15px; font-weight: 600; margin: 4px 0 12px; }

    /* Result cards */
    .result {
      border-left: 3px solid var(--border);
      padding: 12px 16px; margin-bottom: 10px;
      background: var(--card); border: 1px solid var(--border);
      border-left-width: 3px; border-radius: var(--radius);
    }
    .result.ok { border-left-color: var(--accent-green); }
    .result.fail { border-left-color: var(--destructive); }
    .result .head { display: flex; align-items: center; gap: 10px; }
    .result .name { font-weight: 600; word-break: break-all; }
    .badge {
      font-size: 11px; font-weight: 600; padding: 2px 8px;
      border-radius: 10px; text-transform: uppercase; letter-spacing: .03em;
    }
    .badge.ok { background: #e6f4ec; color: var(--accent-green); }
    .badge.fail { background: #fbe9e9; color: var(--destructive); }
    .result .meta { color: var(--text-secondary); font-size: 12.5px; margin-top: 6px; }
    .result .err { color: var(--destructive); font-size: 13px; margin-top: 6px; white-space: pre-wrap; }

    .actions { margin-top: 10px; display: flex; gap: 10px; align-items: center; }
    a.download {
      color: var(--accent-blue); text-decoration: none; font-weight: 600; font-size: 13px;
    }
    a.download:hover { text-decoration: underline; }

    details { margin-top: 10px; }
    summary {
      cursor: pointer; color: var(--accent-blue); font-size: 13px; font-weight: 600;
      outline: none;
    }
    .turn {
      border-top: 1px solid var(--border); padding: 8px 0; font-size: 13px;
    }
    .turn:first-child { border-top: none; }
    .turn .who {
      font-weight: 600; font-size: 11px; text-transform: uppercase;
      letter-spacing: .03em; color: var(--text-tertiary);
    }
    .turn .who.M { color: var(--accent-blue); }
    .turn .who.P { color: var(--sap-amber); }
    .turn .blk { color: var(--text-tertiary); font-size: 11px; }
    .turn .txt { margin-top: 2px; }
    .turn .sd { color: var(--text-tertiary); font-style: italic; font-size: 12px; }

    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid #ffffff80; border-top-color: #fff;
      border-radius: 50%; animation: spin .7s linear infinite; vertical-align: -2px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <header>
    <span class="dot"></span>
    <h1>Interview Transcript Converter</h1>
    <span class="sub">SAP Experience Garage · .docx → JSON</span>
  </header>

  <main>
    <div class="card">
      <div id="drop">
        <div class="big">Drop .docx transcripts here</div>
        <div class="small">or click to browse — you can select multiple files</div>
        <input id="file" type="file" accept=".docx" multiple hidden />
      </div>

      <ul id="filelist" class="filelist"></ul>

      <div class="row">
        <button id="convert" class="primary" disabled>Upload &amp; Convert</button>
        <span id="status" class="hint"></span>
      </div>
    </div>

    <div id="results-wrap" class="card" style="display:none;">
      <h2>Results</h2>
      <div id="results"></div>
    </div>
  </main>

  <script>
    const drop = document.getElementById("drop");
    const fileInput = document.getElementById("file");
    const fileListEl = document.getElementById("filelist");
    const convertBtn = document.getElementById("convert");
    const statusEl = document.getElementById("status");
    const resultsWrap = document.getElementById("results-wrap");
    const resultsEl = document.getElementById("results");

    let files = []; // staged File objects

    function refreshList() {
      fileListEl.innerHTML = "";
      files.forEach((f, i) => {
        const li = document.createElement("li");
        li.innerHTML = `<span>📄</span><span>${escapeHtml(f.name)}</span>`;
        const rm = document.createElement("button");
        rm.className = "rm";
        rm.textContent = "×";
        rm.title = "Remove";
        rm.onclick = () => { files.splice(i, 1); refreshList(); };
        li.appendChild(rm);
        fileListEl.appendChild(li);
      });
      convertBtn.disabled = files.length === 0;
    }

    function addFiles(fileObjs) {
      for (const f of fileObjs) {
        if (!f.name.toLowerCase().endsWith(".docx")) continue;
        if (!files.some(x => x.name === f.name && x.size === f.size)) files.push(f);
      }
      refreshList();
    }

    drop.onclick = () => fileInput.click();
    fileInput.onchange = () => { addFiles(fileInput.files); fileInput.value = ""; };

    ["dragenter", "dragover"].forEach(ev =>
      drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.add("drag"); }));
    ["dragleave", "drop"].forEach(ev =>
      drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.remove("drag"); }));
    drop.addEventListener("drop", e => addFiles(e.dataTransfer.files));

    convertBtn.onclick = async () => {
      if (!files.length) return;
      convertBtn.disabled = true;
      statusEl.innerHTML = `<span class="spinner"></span> Converting ${files.length} file(s)…`;

      const fd = new FormData();
      files.forEach(f => fd.append("files", f));

      try {
        const resp = await fetch("/convert", { method: "POST", body: fd });
        if (!resp.ok) throw new Error("Server returned " + resp.status);
        const data = await resp.json();
        renderResults(data.results || []);
        statusEl.textContent = "Done.";
      } catch (err) {
        statusEl.innerHTML = `<span style="color:var(--destructive)">Error: ${escapeHtml(err.message)}</span>`;
      } finally {
        convertBtn.disabled = files.length === 0;
      }
    };

    function renderResults(results) {
      resultsWrap.style.display = "block";
      resultsEl.innerHTML = "";
      for (const r of results) {
        const div = document.createElement("div");
        div.className = "result " + (r.success ? "ok" : "fail");

        let html = `<div class="head">
            <span class="name">${escapeHtml(r.filename)}</span>
            <span class="badge ${r.success ? "ok" : "fail"}">${r.success ? "success" : "failed"}</span>
          </div>`;

        if (r.success) {
          const s = r.stats || {};
          const p = r.participant || {};
          const who = [p.name, p.role].filter(Boolean).join(" — ");
          html += `<div class="meta">
              ${who ? escapeHtml(who) + " · " : ""}
              ${s.total_turns ?? "?"} turns · ${s.block_count ?? "?"} blocks
              (${s.moderator_turns ?? "?"} moderator / ${s.participant_turns ?? "?"} participant)
            </div>`;
          html += `<div class="actions">
              <a class="download" href="/download/${encodeURIComponent(r.json_filename)}" download>⬇ Download ${escapeHtml(r.json_filename)}</a>
            </div>`;
          html += renderPreview(r.preview_turns || []);
        } else {
          html += `<div class="err">${escapeHtml(r.error || "Unknown error")}</div>`;
        }

        div.innerHTML = html;
        resultsEl.appendChild(div);
      }
    }

    function renderPreview(turns) {
      if (!turns.length) return "";
      let inner = "";
      for (const t of turns) {
        const code = (t.speaker_code || "").toUpperCase();
        const sd = (t.stage_directions || []).length
          ? `<div class="sd">(${t.stage_directions.map(escapeHtml).join("; ")})</div>` : "";
        inner += `<div class="turn">
            <span class="who ${code}">${escapeHtml(t.speaker || code)}</span>
            <span class="blk">· ${escapeHtml(t.block || "")}</span>
            <div class="txt">${escapeHtml(t.text || "")}</div>
            ${sd}
          </div>`;
      }
      return `<details><summary>Preview first ${turns.length} turns</summary>${inner}</details>`;
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c =>
        ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    }
  </script>
</body>
</html>
